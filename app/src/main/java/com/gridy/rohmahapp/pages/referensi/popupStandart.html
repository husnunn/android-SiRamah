<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- Main Background Canvas (A blurred dashboard representation to show context) -->
<main class="flex-grow p-6 md:p-12 max-w-7xl mx-auto w-full opacity-30 pointer-events-none filter blur-[2px]">
    <div class="flex justify-between items-end mb-12">
        <div>

    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <div class="h-48 bg-surface-container-low rounded-xl"></div>
            <div class="h-96 bg-surface-container-low rounded-xl"></div>

        </div>
    </div>
</main>

<div class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-on-surface/10 backdrop-blur-md">

    <div class="glass-panel w-full max-w-md rounded-xl p-8 flex flex-col items-center text-center shadow-[0_32px_64px_-12px_rgba(0,0,0,0.08)] transform scale-100 transition-all duration-300">

        <div class="relative mb-8">
            <!-- Outer soft glow -->
            <div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full transform scale-150"></div>
            <!-- Icon Shell -->
            <div class="relative w-24 h-24 bg-primary rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-5xl" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
            </div>
        </div>
        <!-- Content -->
        <div class="space-y-3 mb-10">
            <h2 class="font-headline text-3xl font-extrabold tracking-tight text-primary">Berhasil!</h2>
            <p class="font-body text-secondary text-sm leading-relaxed max-w-[280px] mx-auto">
                Data kehadiran Anda telah tersimpan dan akan disinkronkan secara otomatis.
            </p>
        </div>
        <!-- Action Button -->
        <button class="w-full py-4 bg-primary text-on-primary font-headline font-bold rounded-xl active:scale-[0.98] transition-transform duration-150">
            Tutup
        </button>
        <!-- Metadata/Contextual Small -->
        <div class="mt-6">
            <p class="font-label text-[10px] uppercase tracking-[0.15em] text-outline opacity-60">
                ID TRANSAKSI: ERHA-9921-2024
            </p>

</div>
